<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="referrer" content="no-referrer">
    <title>GO REGISTER · Empresas</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="./admin.css?v=admin-toast-v3">
    <link rel="stylesheet" href="./notifications.css?v=admin-toast-v1">
</head>

<body>
    <div id="adminApp">
        <main class="login-shell"><section class="login-card"><h1>Administração</h1><p class="muted">Carregando painel...</p></section></main>
    </div>
    <script type="module" src="./admin.js?v=protected-company-actions-v12"></script>
    <script>
        window.addEventListener("error", function () {
            const root = document.querySelector("#adminApp");
            if (root && !root.querySelector("form")) root.innerHTML = '<main class="login-shell"><section class="login-card"><h1>Administração</h1><p class="error">Falha ao carregar o painel. Atualize a página com Ctrl+F5.</p></section></main>';
        });
    </script>
</body>

</html>
